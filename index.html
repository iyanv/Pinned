<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PINNED">
<meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f0f14" media="(prefers-color-scheme: dark)">
<title>PINNED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>

/* ═══════════════════════════════════════════════════════
   TOKENS — light (default)
═══════════════════════════════════════════════════════ */
:root {
  --bg:       #f5f3ef;
  --bg2:      #ffffff;
  --bg3:      #edeae4;
  --surface:  #f0ede8;
  --surface2: #e4e0d8;
  --border:   rgba(0,0,0,0.09);
  --accent:   #2c6e49;
  --accent-lt:#e8f5ee;
  --accent2:  #1e5235;
  --text:     #1a1a1a;
  --text2:    #5a5a5a;
  --text3:    #999;
  --danger:   #c0392b;
  --pin:      #2c6e49;
  --radius:   16px;
  --radius-sm:10px;
  --font-display: 'Syne', sans-serif;
  --font-body:    'Lato', sans-serif;
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
}

/* ═══════════════════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════════════════ */
@media (prefers-color-scheme: dark) {
  :root {
    --bg:       #0f0f14;
    --bg2:      #16161e;
    --bg3:      #1e1e2a;
    --surface:  #22222f;
    --surface2: #2a2a3a;
    --border:   rgba(255,255,255,0.07);
    --accent:   #e8c97a;
    --accent-lt:rgba(232,201,122,0.12);
    --accent2:  #c4a55a;
    --text:     #f0ede8;
    --text2:    #a09b92;
    --text3:    #5a5660;
    --danger:   #e07070;
    --pin:      #e8c97a;
    --shadow:   0 2px 12px rgba(0,0,0,0.4);
  }
}

/* ═══════════════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}

/* ═══════════════════════════════════════════════════════
   SHELL
═══════════════════════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  overflow: hidden;
  position: relative;
}

/* ═══════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════ */
header {
  z-index: 50;
  padding: calc(var(--safe-top) + 16px) 18px 12px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: 3px;
  color: var(--text);
}
.logo .pin { color: var(--accent); margin-right: 2px; }

.btn-new {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 9px 16px;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  white-space: nowrap;
  letter-spacing: 0.2px;
}
.btn-new:active { transform: scale(0.95); opacity: 0.85; }
.btn-new svg { width: 14px; height: 14px; }

/* ═══════════════════════════════════════════════════════
   TABS (bottom nav style)
═══════════════════════════════════════════════════════ */
.tabs {
  display: flex;
  padding: 0 12px 10px;
  gap: 4px;
  flex-shrink: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding-top: 8px;
}
.tab-btn {
  flex: 1;
  padding: 7px 4px;
  border: none;
  background: transparent;
  color: var(--text3);
  border-radius: 8px;
  font-family: var(--font-body);
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}
.tab-btn .tab-icon { font-size: 18px; }
.tab-btn.active { color: var(--accent); }
.tab-btn.active .tab-icon-dot {
  width: 4px; height: 4px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 auto;
}
.tab-icon-dot { width: 4px; height: 4px; border-radius: 50%; margin: 0 auto; }

/* ═══════════════════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════════════════ */
.view { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.view.active { display: flex; }

/* ═══════════════════════════════════════════════════════
   MAP VIEW
═══════════════════════════════════════════════════════ */
#map-view { position: relative; }
#map {
  flex: 0 0 50%;
  width: 100%;
  z-index: 1;
  background: var(--bg3);
}
.map-overlay-tag {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.9);
  border: 1px solid var(--border);
  backdrop-filter: blur(10px);
  color: var(--text2);
  font-size: 11px;
  font-weight: 700;
  padding: 5px 14px;
  border-radius: 50px;
  z-index: 10;
  white-space: nowrap;
  letter-spacing: 0.5px;
  box-shadow: var(--shadow);
}
@media (prefers-color-scheme: dark) {
  .map-overlay-tag { background: rgba(15,15,20,0.85); }
}
.list-panel {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--bg);
}
.list-section-title {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text3);
  padding: 0 4px 6px;
}

/* ═══════════════════════════════════════════════════════
   CALENDAR VIEW
═══════════════════════════════════════════════════════ */
#cal-view { background: var(--bg); }
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  flex-shrink: 0;
}
.cal-month {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 18px;
  letter-spacing: -0.3px;
  text-transform: capitalize;
}
.cal-nav {
  display: flex; gap: 8px;
}
.cal-nav-btn {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  background: var(--bg2);
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  box-shadow: var(--shadow);
}
.cal-nav-btn:active { background: var(--surface2); }

.cal-grid-head {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 0 10px;
  flex-shrink: 0;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text3);
  padding-bottom: 6px;
  text-transform: uppercase;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  padding: 0 10px;
  flex-shrink: 0;
}
.cal-day {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding-top: 4px;
  border-radius: 8px;
  cursor: default;
  position: relative;
  transition: background 0.15s;
  gap: 2px;
}
.cal-day.has-plans { cursor: pointer; }
.cal-day.has-plans:active { background: var(--surface); }
.cal-day-num {
  font-size: 12px;
  font-weight: 400;
  color: var(--text3);
  line-height: 1;
}
.cal-day.today .cal-day-num {
  background: var(--accent);
  color: #fff;
  width: 20px; height: 20px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.cal-day.has-plans .cal-day-num { color: var(--text); font-weight: 700; }
.cal-day.other-month .cal-day-num { opacity: 0.3; }

.cal-pills {
  display: flex;
  flex-direction: column;
  gap: 1px;
  width: 100%;
  padding: 0 1px;
  overflow: hidden;
}
.cal-pill {
  height: 4px;
  border-radius: 2px;
  width: 100%;
  background: var(--accent);
  opacity: 0.7;
}
.cal-pill.more { opacity: 0.3; }

.cal-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cal-day-header {
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  padding: 8px 4px 4px;
  letter-spacing: 0.3px;
}

/* ═══════════════════════════════════════════════════════
   LIST VIEW
═══════════════════════════════════════════════════════ */
.sort-bar {
  display: flex;
  gap: 6px;
  padding: 10px 14px 8px;
  flex-shrink: 0;
  background: var(--bg);
}
.sort-btn {
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  border-radius: 50px;
  font-size: 12px;
  font-family: var(--font-body);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow);
}
.sort-btn.active {
  background: var(--accent-lt);
  color: var(--accent);
  border-color: var(--accent);
}
#list-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 0 14px;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding-top: 4px;
}

/* ═══════════════════════════════════════════════════════
   PLAN CARD
═══════════════════════════════════════════════════════ */
.plan-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: stretch;
  cursor: pointer;
  transition: transform 0.18s;
  box-shadow: var(--shadow);
}
.plan-card:active { transform: scale(0.98); }

.plan-card-photo {
  width: 72px;
  flex-shrink: 0;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  position: relative;
  overflow: hidden;
}
.plan-card-photo img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}
.plan-card-body {
  flex: 1;
  padding: 10px 12px 9px;
  min-width: 0;
}
.plan-card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 1px;
}
.plan-card-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.plan-card-stars { display: flex; gap: 1px; flex-shrink: 0; }
.star { color: var(--surface2); font-size: 11px; }
.star.lit { color: #f4c430; }

.plan-card-sub {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.plan-card-date { font-size: 11px; color: var(--text3); }
.plan-card-loc {
  font-size: 10px;
  color: var(--text3);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* empty */
.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; padding: 50px 20px;
  color: var(--text3); text-align: center;
}
.empty-state .big { font-size: 44px; }
.empty-state p { font-size: 13px; line-height: 1.6; }

/* marker */
.custom-marker {
  width: 38px; height: 38px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  border: 2px solid rgba(255,255,255,0.6);
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
}
.custom-marker-inner { transform: rotate(45deg); font-size: 15px; }

/* ═══════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════ */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-height: 94dvh;
  overflow-y: auto;
  padding: 0 0 calc(var(--safe-bottom) + 24px);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  border-top: 1px solid var(--border);
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  margin: 12px auto 0;
}
.modal-header {
  padding: 14px 18px 0;
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title {
  font-family: var(--font-display);
  font-weight: 800; font-size: 20px;
  letter-spacing: -0.3px;
}
.modal-close {
  width: 30px; height: 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:active { background: var(--surface2); }
.modal-body { padding: 18px; display: flex; flex-direction: column; gap: 16px; }

/* Fields */
.field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 7px;
  display: block;
}
.field-input {
  width: 100%;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 400;
  padding: 11px 13px;
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field-input::placeholder { color: var(--text3); }
.field-input:focus { border-color: var(--accent); background: var(--bg2); }

/* Type grid */
.type-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}
.type-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 6px 9px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.type-btn:active { transform: scale(0.95); }
.type-btn.selected { border-color: var(--accent); background: var(--accent-lt); }
.type-btn-emoji { font-size: 22px; }
.type-btn-label {
  font-size: 10px; font-weight: 700;
  color: var(--text2); text-align: center;
  letter-spacing: 0.3px; font-family: var(--font-body);
}
.type-btn.selected .type-btn-label { color: var(--accent); }

/* Stars */
.stars-input { display: flex; gap: 6px; padding: 2px 0; }
.star-input {
  font-size: 32px; cursor: pointer;
  transition: transform 0.1s;
  color: var(--surface2);
  -webkit-user-select: none; user-select: none;
}
.star-input.lit { color: #f4c430; }
.star-input:active { transform: scale(1.3); }

/* Photo */
.photo-area {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  min-height: 90px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; cursor: pointer;
  transition: border-color 0.2s;
  overflow: hidden; position: relative;
  background: var(--surface);
}
.photo-area:active { border-color: var(--accent); }
.photo-area img { width: 100%; height: 150px; object-fit: cover; }
.photo-area-label {
  font-size: 12px; color: var(--text3);
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  font-weight: 700;
}
.photo-area-label .icon { font-size: 22px; }

/* Location */
.loc-row { display: flex; gap: 8px; align-items: center; }
.loc-display {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 13px;
  font-size: 13px; color: var(--text2);
  min-height: 42px; display: flex; align-items: center;
}
.btn-loc {
  padding: 10px 13px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-size: 17px; cursor: pointer;
  transition: background 0.15s;
}
.btn-loc:active { background: var(--surface2); }

.btn-save {
  width: 100%; padding: 14px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-weight: 700; font-size: 15px;
  letter-spacing: 0.3px; cursor: pointer;
  transition: opacity 0.15s, transform 0.15s;
}
.btn-save:active { opacity: 0.85; transform: scale(0.98); }

/* ── DETAIL MODAL ── */
.detail-photo { width: 100%; height: 200px; object-fit: cover; }
.detail-no-photo {
  width: 100%; height: 110px;
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 50px;
}
.detail-body { padding: 16px 18px; }
.detail-plan-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 800;
  color: var(--text); margin-bottom: 4px;
  letter-spacing: -0.3px;
}
.detail-type-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.detail-badge {
  background: var(--surface);
  border-radius: 50px;
  padding: 4px 11px;
  font-size: 12px; color: var(--text2);
  font-weight: 700; border: 1px solid var(--border);
}
.detail-stars { display: flex; gap: 2px; }
.detail-stars .star { font-size: 16px; }
.detail-with {
  display: flex; gap: 6px; align-items: center;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 10px 13px; font-size: 13px; color: var(--text2);
  margin-bottom: 8px; border: 1px solid var(--border);
}
.detail-loc-full {
  display: flex; gap: 8px; align-items: flex-start;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 10px 13px; font-size: 13px; color: var(--text2);
  border: 1px solid var(--border); margin-bottom: 8px;
}
.detail-notes {
  font-size: 14px; color: var(--text2);
  line-height: 1.6;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: 11px 13px; margin-bottom: 8px;
  border: 1px solid var(--border);
}
.detail-actions { display: flex; gap: 8px; margin-top: 8px; }
.btn-share {
  flex: 1; padding: 12px;
  background: var(--accent-lt);
  border: 1.5px solid var(--accent);
  border-radius: var(--radius-sm);
  color: var(--accent);
  font-family: var(--font-body);
  font-weight: 700; font-size: 14px;
  cursor: pointer; transition: background 0.15s;
}
.btn-share:active { background: var(--accent); color: #fff; }
.btn-delete {
  flex: 1; padding: 12px;
  background: transparent;
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: var(--radius-sm);
  color: var(--danger);
  font-family: var(--font-body);
  font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-delete:active { background: rgba(192,57,43,0.08); }

/* ── SHARE MODAL ── */
#share-modal .modal { border-radius: 24px 24px 0 0; }
.share-canvas-wrap {
  padding: 0 18px;
  display: flex; flex-direction: column; gap: 12px; align-items: center;
}
#share-canvas {
  width: 100%;
  max-width: 320px;
  aspect-ratio: 9/16;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
}
.share-canvas-inner {
  width: 320px; height: 568px;
  position: relative;
  background: linear-gradient(135deg, #2c6e49 0%, #1a4a2e 100%);
  border-radius: 16px; overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 32px;
  font-family: var(--font-body);
}
.share-canvas-inner.has-photo { justify-content: flex-end; }
.share-bg-photo {
  position: absolute; inset: 0;
  object-fit: cover; width: 100%; height: 100%;
  opacity: 0.55;
}
.share-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 40%, transparent 100%);
}
.share-content { position: relative; z-index: 2; width: 100%; }
.share-emoji-big { font-size: 52px; display: block; margin-bottom: 8px; }
.share-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; color: #fff; line-height: 1.1; margin-bottom: 4px; }
.share-type { font-size: 14px; color: rgba(255,255,255,0.7); font-weight: 700; margin-bottom: 12px; }
.share-stars-row { display: flex; gap: 4px; margin-bottom: 10px; }
.share-star { font-size: 20px; color: #f4c430; }
.share-star.dim { opacity: 0.25; }
.share-meta { font-size: 12px; color: rgba(255,255,255,0.6); }
.share-app-tag {
  position: absolute; top: 20px; left: 0; right: 0;
  text-align: center; z-index: 2;
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 13px;
  letter-spacing: 3px; color: rgba(255,255,255,0.6);
}

.btn-download {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-family: var(--font-body); font-weight: 700; font-size: 15px;
  cursor: pointer;
}
.btn-download:active { opacity: 0.85; }
.share-hint {
  font-size: 12px; color: var(--text3);
  text-align: center; line-height: 1.5;
  padding: 0 10px 4px;
}

/* custom plan */
.custom-plan-fields { display: flex; flex-direction: column; gap: 10px; }
.emoji-picker-row {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 8px;
  background: var(--surface); border-radius: var(--radius-sm);
}
.ep-emoji {
  font-size: 22px; cursor: pointer; padding: 3px;
  border-radius: 6px; transition: background 0.15s;
}
.ep-emoji.selected { background: var(--surface2); }
.no-loc-label { color: var(--text3); font-size: 13px; }

/* leaflet */
.leaflet-container { background: #e8e4da; }
@media (prefers-color-scheme: dark) {
  .leaflet-container { background: #1a1a24; }
  .leaflet-tile { filter: brightness(0.75) saturate(0.6) hue-rotate(200deg); }
}
.leaflet-control-zoom a {
  background: var(--bg2) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>

<div id="app">

  <header>
    <div class="logo"><span class="pin">📍</span>PINNED</div>
    <button class="btn-new" onclick="openNewPlan()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
      </svg>
      Nuevo
    </button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('map',this)">
      <span class="tab-icon">🗺️</span>
      <span>Mapa</span>
      <div class="tab-icon-dot"></div>
    </button>
    <button class="tab-btn" onclick="switchTab('cal',this)">
      <span class="tab-icon">📅</span>
      <span>Calendario</span>
      <div class="tab-icon-dot"></div>
    </button>
    <button class="tab-btn" onclick="switchTab('list',this)">
      <span class="tab-icon">📋</span>
      <span>Lista</span>
      <div class="tab-icon-dot"></div>
    </button>
  </div>

  <!-- MAP -->
  <div id="map-view" class="view active">
    <div id="map"></div>
    <div class="map-overlay-tag" id="map-tag">Cargando ubicación…</div>
    <div class="list-panel" id="map-list">
      <div class="list-section-title">Planes cercanos &amp; recientes</div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div id="cal-view" class="view">
    <div class="cal-header">
      <div class="cal-month" id="cal-month-label"></div>
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
        <button class="cal-nav-btn" onclick="calNav(1)">›</button>
      </div>
    </div>
    <div class="cal-grid-head">
      <div class="cal-dow">L</div><div class="cal-dow">M</div>
      <div class="cal-dow">X</div><div class="cal-dow">J</div>
      <div class="cal-dow">V</div><div class="cal-dow">S</div>
      <div class="cal-dow">D</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-scroll" id="cal-scroll">
      <div class="list-section-title" id="cal-list-label">Todos los planes del mes</div>
    </div>
  </div>

  <!-- LIST -->
  <div id="list-view" class="view">
    <div class="sort-bar">
      <button class="sort-btn active" onclick="setSort('fecha',this)">📅 Fecha</button>
      <button class="sort-btn" onclick="setSort('stars',this)">⭐ Nota</button>
      <button class="sort-btn" onclick="setSort('cerca',this)">📍 Cercanía</button>
    </div>
    <div id="list-scroll"></div>
  </div>

</div>

<!-- ══ NEW PLAN MODAL ══ -->
<div class="modal-backdrop" id="new-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Nuevo plan</div>
      <button class="modal-close" onclick="closeNewPlan()">✕</button>
    </div>
    <div class="modal-body">

      <!-- Type -->
      <div>
        <label class="field-label">Tipo de plan</label>
        <div class="type-grid" id="type-grid">
          <div class="type-btn selected" data-type="gym" onclick="selectType(this)">
            <span class="type-btn-emoji">🏋️</span><span class="type-btn-label">Gimnasio</span>
          </div>
          <div class="type-btn" data-type="dinner" onclick="selectType(this)">
            <span class="type-btn-emoji">🍽️</span><span class="type-btn-label">Cena</span>
          </div>
          <div class="type-btn" data-type="cinema" onclick="selectType(this)">
            <span class="type-btn-emoji">🎬</span><span class="type-btn-label">Cine</span>
          </div>
          <div class="type-btn" data-type="hike" onclick="selectType(this)">
            <span class="type-btn-emoji">🥾</span><span class="type-btn-label">Ruta</span>
          </div>
          <div class="type-btn" data-type="offroad" onclick="selectType(this)">
            <span class="type-btn-emoji">🚙</span><span class="type-btn-label">4×4</span>
          </div>
          <div class="type-btn" data-type="custom" onclick="selectType(this)">
            <span class="type-btn-emoji">✨</span><span class="type-btn-label">Personalizado</span>
          </div>
        </div>
      </div>

      <!-- Custom -->
      <div id="custom-fields" style="display:none">
        <label class="field-label">Plan personalizado</label>
        <div class="custom-plan-fields">
          <input class="field-input" id="custom-name" placeholder="Nombre del plan…" type="text">
          <div>
            <label class="field-label" style="margin-bottom:6px">Emoji</label>
            <div class="emoji-picker-row" id="emoji-picker"></div>
            <input class="field-input" id="custom-emoji" placeholder="… o escribe tu emoji" maxlength="4" style="margin-top:7px">
          </div>
        </div>
      </div>

      <!-- Title -->
      <div>
        <label class="field-label">Título (opcional)</label>
        <input class="field-input" id="plan-title" type="text" placeholder="Ej: Noche en el Retiro, Cumpleaños de Ana…">
      </div>

      <!-- Date -->
      <div>
        <label class="field-label">Fecha</label>
        <input class="field-input" id="plan-date" type="date">
      </div>

      <!-- With -->
      <div>
        <label class="field-label">¿Con quién? (opcional)</label>
        <input class="field-input" id="plan-with" type="text" placeholder="Ej: María, Carlos, familia…">
      </div>

      <!-- Rating -->
      <div>
        <label class="field-label">Puntuación</label>
        <div class="stars-input" id="stars-input">
          <span class="star-input" data-v="1" onclick="setStar(1)">★</span>
          <span class="star-input" data-v="2" onclick="setStar(2)">★</span>
          <span class="star-input" data-v="3" onclick="setStar(3)">★</span>
          <span class="star-input" data-v="4" onclick="setStar(4)">★</span>
          <span class="star-input" data-v="5" onclick="setStar(5)">★</span>
        </div>
      </div>

      <!-- Notes -->
      <div>
        <label class="field-label">Notas (opcional)</label>
        <textarea class="field-input" id="plan-notes" rows="2" placeholder="¿Cómo fue?…" style="resize:none"></textarea>
      </div>

      <!-- Photo -->
      <div>
        <label class="field-label">Foto (opcional)</label>
        <div class="photo-area" id="photo-area" onclick="pickPhoto()">
          <div class="photo-area-label">
            <span class="icon">📷</span>
            <span>Añadir foto</span>
          </div>
        </div>
        <input type="file" id="photo-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event)">
      </div>

      <!-- Location -->

        <label class="field-label">Ubicación</label>
        <div class="loc-row">
          <div class="loc-display" id="loc-display"><span class="no-loc-label">Sin ubicación</span></div>
          <button class="btn-loc" onclick="getLocation()">📍</button>

      <button class="btn-save" onclick="savePlan()">Guardar plan</button>
    </div>
  </div>
</div>

<!-- ══ DETAIL MODAL ══ -->
<div class="modal-backdrop" id="detail-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="detail-title"></div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<!-- ══ SHARE MODAL ══ -->
<div class="modal-backdrop" id="share-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Compartir</div>
      <button class="modal-close" onclick="closeShare()">✕</button>
    </div>
    <div class="modal-body">
      <div class="share-canvas-wrap">
        <div id="share-canvas">
          <div class="share-canvas-inner" id="share-inner">
            <div class="share-app-tag">PINNED</div>
            <img class="share-bg-photo" id="share-bg" src="" alt="" style="display:none">
            <div class="share-gradient"></div>
            <div class="share-content">
              <span class="share-emoji-big" id="share-emoji">🎬</span>
              <div class="share-title" id="share-stitle"></div>
              <div class="share-type" id="share-stype"></div>
              <div class="share-stars-row" id="share-sstars"></div>
              <div class="share-meta" id="share-smeta"></div>
            </div>
          </div>

<canvas id="render-canvas" style="display:none"></canvas>

<script>
// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const PLAN_TYPES = {
  gym:     { emoji:'🏋️', label:'Gimnasio' },
  dinner:  { emoji:'🍽️', label:'Cena' },
  cinema:  { emoji:'🎬', label:'Cine' },
  hike:    { emoji:'🥾', label:'Ruta' },
  offroad: { emoji:'🚙', label:'4×4' },
  custom:  { emoji:'✨', label:'Personalizado' },
};

let plans = JSON.parse(localStorage.getItem('pinned_v2') || '[]');
let currentStar = 0, currentType = 'gym';
let currentPhoto = null, currentLoc = null;
let currentCustomEmoji = '✨', selectedEmojiEl = null;
let userLoc = null;
let map, currentSort = 'fecha';
let calYear, calMonth, calFilterDate = null;
let shareTarget = null;

function savePlans() { localStorage.setItem('pinned_v2', JSON.stringify(plans)); }

function planInfo(p) {
  return p.type === 'custom'
    ? { emoji: p.customEmoji||'✨', label: p.customName||'Plan' }
    : PLAN_TYPES[p.type]||PLAN_TYPES.custom;
}
function planDisplayName(p) {
  const i = planInfo(p);
  return p.title || (p.type==='custom' ? i.label : i.label);
}

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.classList.remove('active');
    b.querySelector('.tab-icon-dot').style.background='';
  });
  btn.classList.add('active');
  btn.querySelector('.tab-icon-dot').style.background='var(--accent)';
  document.getElementById(`${tab}-view`).classList.add('active');
  if (tab==='map') { setTimeout(()=>map&&map.invalidateSize(),100); renderMapList(); }
  if (tab==='cal') renderCal();
  if (tab==='list') renderList();
}

// ═══════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════
function initMap() {
  map = L.map('map', {zoomControl:false, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.setView([40.416,-3.703],12);

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos=>{
      userLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setView([userLoc.lat,userLoc.lng],13);
      document.getElementById('map-tag').textContent='Cerca de ti';
      const icon=L.divIcon({className:'',
        html:`<div style="width:13px;height:13px;background:var(--accent);border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(44,110,73,0.2);"></div>`,
        iconSize:[13,13],iconAnchor:[6,6]});
      L.marker([userLoc.lat,userLoc.lng],{icon}).addTo(map);
      addPlanMarkers(); renderMapList();
    },()=>{
      document.getElementById('map-tag').textContent='Activa ubicación para ver cerca';
      addPlanMarkers();
    });
  }
}

function addPlanMarkers() {
  plans.forEach(p=>{
    if(!p.loc) return;
    const info=planInfo(p);
    const icon=L.divIcon({className:'',
      html:`<div class="custom-marker" style="background:var(--accent)"><div class="custom-marker-inner">${info.emoji}</div></div>`,
      iconSize:[38,38],iconAnchor:[19,38],popupAnchor:[0,-38]});
    L.marker([p.loc.lat,p.loc.lng],{icon}).addTo(map).on('click',()=>openDetail(p.id));
  });
}

// ═══════════════════════════════════════════════════════
// RENDER HELPERS
// ═══════════════════════════════════════════════════════
function starsHtml(n,size='') {
  let h='';
  for(let i=1;i<=5;i++) h+=`<span class="star ${i<=n?'lit':''}"${size?` style="font-size:${size}"`:''}">★</span>`;
  return h;
}

function distKm(a,b) {
  if(!a||!b) return Infinity;
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function distLabel(km) {
  if(km===Infinity) return '';
  return km<1?`${Math.round(km*1000)} m`:`${km.toFixed(1)} km`;
}

function planCard(p) {
  const info=planInfo(p);
  const d=new Date(p.date+'T12:00:00');
  const dateStr=d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
  const km=distKm(userLoc,p.loc);
  const locTxt=p.loc?(distLabel(km)?`${distLabel(km)} · ${p.loc.label||''}`:(p.loc.label||'')):'';
  const displayName = p.title || (p.type==='custom'?p.customName:info.label) || info.label;
  const subLine = p.type==='custom'&&p.customName&&p.title ? `${info.emoji} ${p.customName}` : (p.title ? `${info.emoji} ${info.label==='Personalizado'?(p.customName||'Plan'):info.label}` : '');

  return `<div class="plan-card" onclick="openDetail('${p.id}')">
    <div class="plan-card-photo">
      ${p.photo?`<img src="${p.photo}" alt="">`:info.emoji}
    </div>
    <div class="plan-card-body">
      <div class="plan-card-top">
        <div class="plan-card-title">${displayName}</div>
        <div class="plan-card-stars">${starsHtml(p.stars)}</div>
      </div>
      ${subLine?`<div class="plan-card-sub">${subLine}</div>`:''}
      <div class="plan-card-date">${dateStr}${p.with?' · 👥 '+p.with:''}</div>
      ${locTxt?`<div class="plan-card-loc">📍 ${locTxt}</div>`:''}
    </div>
  </div>`;
}

function renderMapList() {
  const el=document.getElementById('map-list');
  let sorted=[...plans].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(userLoc) sorted.sort((a,b)=>distKm(userLoc,a.loc)-distKm(userLoc,b.loc));
  el.innerHTML='<div class="list-section-title">Planes cercanos &amp; recientes</div>';
  if(!sorted.length){el.innerHTML+=`<div class="empty-state"><div class="big">🗺️</div><p>Aún no hay planes.<br>¡Pulsa "+ Nuevo" para empezar!</p></div>`;return;}
  sorted.forEach(p=>el.innerHTML+=planCard(p));
}

function renderList() {
  const el=document.getElementById('list-scroll');
  let sorted=[...plans];
  if(currentSort==='fecha') sorted.sort((a,b)=>new Date(b.date)-new Date(a.date));
  else if(currentSort==='stars') sorted.sort((a,b)=>b.stars-a.stars);
  else sorted.sort((a,b)=>distKm(userLoc,a.loc)-distKm(userLoc,b.loc));
  el.innerHTML='';
  if(!sorted.length){el.innerHTML=`<div class="empty-state"><div class="big">📋</div><p>Aún no hay planes registrados.</p></div>`;return;}
  sorted.forEach(p=>el.innerHTML+=planCard(p));
}

function setSort(s,btn) {
  currentSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderList();
}

// ═══════════════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════════════
const MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function calNav(dir) { calMonth+=dir; if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;} calFilterDate=null; renderCal(); }

function renderCal() {
  const now=new Date(); const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  document.getElementById('cal-month-label').textContent=`${MONTHS_ES[calMonth]} ${calYear}`;

  // build plan map
  const plansByDay={};
  plans.forEach(p=>{
    const [y,m]=p.date.split('-').map(Number);
    if(y===calYear&&m-1===calMonth){ plansByDay[p.date]=(plansByDay[p.date]||[]); plansByDay[p.date].push(p); }
  });

  // days grid
  const firstDay=new Date(calYear,calMonth,1);
  let startDow=firstDay.getDay(); // 0=Sun
  startDow=(startDow+6)%7; // Mon=0
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();

  let grid='';
  let total=startDow+daysInMonth; let cells=Math.ceil(total/7)*7;
  for(let i=0;i<cells;i++){
    let day,month=calMonth,year=calYear,otherMonth=false;
    if(i<startDow){day=daysInPrev-(startDow-1-i);month=calMonth-1;if(month<0){month=11;year--;}otherMonth=true;}
    else if(i-startDow>=daysInMonth){day=i-startDow-daysInMonth+1;month=calMonth+1;if(month>11){month=0;year++;}otherMonth=true;}
    else{day=i-startDow+1;}
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayPlans=plansByDay[dateStr]||[];
    const isToday=dateStr===todayStr;
    const isSelected=dateStr===calFilterDate;
    const hasPl=dayPlans.length>0;
    const pillsHtml=dayPlans.slice(0,3).map((_,idx)=>`<div class="cal-pill${idx===2&&dayPlans.length>2?' more':''}"></div>`).join('');
    grid+=`<div class="cal-day${hasPl?' has-plans':''}${otherMonth?' other-month':''}${isToday?' today':''}${isSelected?' selected':''}" onclick="${hasPl?`calSelectDay('${dateStr}')`:''}" style="${isSelected?'background:var(--accent-lt);border-radius:8px;':''}">
      <div class="cal-day-num">${day}</div>
      ${hasPl?`<div class="cal-pills">${pillsHtml}</div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=grid;
  renderCalList();
}

function calSelectDay(dateStr) {
  calFilterDate=calFilterDate===dateStr?null:dateStr;
  renderCal();
}

function renderCalList() {
  const el=document.getElementById('cal-scroll');
  const label=document.getElementById('cal-list-label');
  let filtered;
  if(calFilterDate){
    filtered=plans.filter(p=>p.date===calFilterDate);
    const d=new Date(calFilterDate+'T12:00:00');
    label.textContent=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  } else {
    filtered=plans.filter(p=>{const[y,m]=p.date.split('-').map(Number);return y===calYear&&m-1===calMonth;});
    filtered.sort((a,b)=>new Date(a.date)-new Date(b.date));
    label.textContent=`${MONTHS_ES[calMonth]} ${calYear}`;
  }
  el.innerHTML='';
  el.appendChild(document.getElementById('cal-list-label'));
  if(!filtered.length){el.innerHTML+='<div class="empty-state" style="padding:30px 0"><div class="big">📅</div><p>Sin planes este día</p></div>';return;}
  filtered.forEach(p=>el.innerHTML+=planCard(p));
}

// ═══════════════════════════════════════════════════════
// NEW PLAN MODAL
// ═══════════════════════════════════════════════════════
function openNewPlan() {
  currentStar=0; currentType='gym'; currentPhoto=null; currentLoc=null; currentCustomEmoji='✨';
  document.getElementById('plan-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('plan-notes').value='';
  document.getElementById('plan-title').value='';
  document.getElementById('plan-with').value='';
  document.getElementById('custom-name').value='';
  document.getElementById('custom-emoji').value='';
  document.getElementById('loc-display').innerHTML='<span class="no-loc-label">Sin ubicación</span>';
  document.getElementById('photo-area').innerHTML=`<div class="photo-area-label"><span class="icon">📷</span><span>Añadir foto</span></div>`;
  document.querySelectorAll('.star-input').forEach(s=>s.classList.remove('lit'));
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('[data-type="gym"]').classList.add('selected');
  document.getElementById('custom-fields').style.display='none';
  buildEmojiPicker();
  document.getElementById('new-modal').classList.add('open');
}
function closeNewPlan(){document.getElementById('new-modal').classList.remove('open');}

function selectType(el) {
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected'); currentType=el.dataset.type;
  document.getElementById('custom-fields').style.display=currentType==='custom'?'flex':'none';
  if(currentType==='custom') document.getElementById('custom-fields').style.flexDirection='column';
}
function setStar(n) {
  currentStar=n;
  document.querySelectorAll('.star-input').forEach(s=>s.classList.toggle('lit',parseInt(s.dataset.v)<=n));
}
function pickPhoto(){document.getElementById('photo-input').click();}
function handlePhoto(e) {
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{currentPhoto=ev.target.result;document.getElementById('photo-area').innerHTML=`<img src="${currentPhoto}" alt="">`;}
  r.readAsDataURL(file);
}
function getLocation() {
  if(!navigator.geolocation) return;
  document.getElementById('loc-display').innerHTML='<span class="no-loc-label">Obteniendo…</span>';
  navigator.geolocation.getCurrentPosition(pos=>{
    currentLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,label:''};
    fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`)
      .then(r=>r.json()).then(d=>{
        const parts=[];
        if(d.address.road) parts.push(d.address.road);
        if(d.address.city||d.address.town||d.address.village) parts.push(d.address.city||d.address.town||d.address.village);
        currentLoc.label=parts.join(', ')||`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        document.getElementById('loc-display').textContent=currentLoc.label;
      }).catch(()=>{currentLoc.label=`${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;document.getElementById('loc-display').textContent=currentLoc.label;});
  },()=>{document.getElementById('loc-display').innerHTML='<span class="no-loc-label">No se pudo obtener</span>';});
}
function buildEmojiPicker() {
  const emojis=['🎯','🎮','🎸','🎉','🏖️','🧗','🪂','🏄','🎾','⛷️','🤿','🚴','🏕️','🧘','🎲','🍕','🍺','🎭','🌄','🌊','🎪','🥊','🛹','🛶','🏹','🦅','🌺','🍣','🎵','🤸'];
  document.getElementById('emoji-picker').innerHTML=emojis.map(e=>`<span class="ep-emoji" onclick="pickEmoji(this,'${e}')">${e}</span>`).join('');
}
function pickEmoji(el,emoji) {
  if(selectedEmojiEl) selectedEmojiEl.classList.remove('selected');
  el.classList.add('selected'); selectedEmojiEl=el;
  currentCustomEmoji=emoji; document.getElementById('custom-emoji').value=emoji;
}

function savePlan() {
  const date=document.getElementById('plan-date').value;
  if(!date){alert('Por favor, elige una fecha.');return;}
  if(!currentStar){alert('Por favor, puntúa el plan (1-5 ⭐)');return;}
  if(currentType==='custom'){
    if(!document.getElementById('custom-name').value.trim()){alert('Por favor, pon un nombre al plan.');return;}
    const ef=document.getElementById('custom-emoji').value.trim();
    if(ef) currentCustomEmoji=ef;
  }
  const plan={
    id:Date.now().toString(),
    type:currentType,
    customName:currentType==='custom'?document.getElementById('custom-name').value.trim():'',
    customEmoji:currentType==='custom'?currentCustomEmoji:'',
    title:document.getElementById('plan-title').value.trim(),
    with:document.getElementById('plan-with').value.trim(),
    date,stars:currentStar,
    notes:document.getElementById('plan-notes').value.trim(),
    photo:currentPhoto,loc:currentLoc,
    createdAt:Date.now()
  };
  plans.unshift(plan); savePlans(); closeNewPlan();
  if(plan.loc&&map){
    const info=planInfo(plan);
    const icon=L.divIcon({className:'',html:`<div class="custom-marker" style="background:var(--accent)"><div class="custom-marker-inner">${info.emoji}</div></div>`,iconSize:[38,38],iconAnchor:[19,38]});
    L.marker([plan.loc.lat,plan.loc.lng],{icon}).addTo(map).on('click',()=>openDetail(plan.id));
  }
  renderMapList(); renderList();
  // offer share
  setTimeout(()=>openShare(plan.id),300);
}

// ═══════════════════════════════════════════════════════
// DETAIL
// ═══════════════════════════════════════════════════════
function openDetail(id) {
  const p=plans.find(x=>x.id===id); if(!p) return;
  const info=planInfo(p);
  const d=new Date(p.date+'T12:00:00');
  const dateStr=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const displayName=p.title||info.label;

  document.getElementById('detail-title').textContent=`${info.emoji} ${displayName}`;
  let html='';
  if(p.photo) html+=`<img class="detail-photo" src="${p.photo}" alt="">`;
  else html+=`<div class="detail-no-photo">${info.emoji}</div>`;
  html+=`<div class="detail-body">`;
  if(p.title&&p.type!=='custom') html+=`<div class="detail-plan-title">${p.title}</div>`;
  if(p.title&&p.type==='custom') html+=`<div class="detail-plan-title">${p.title}</div>`;
  html+=`<div class="detail-type-row">
    <span class="detail-badge">${info.emoji} ${info.label==='Personalizado'?(p.customName||'Plan'):info.label}</span>
    <span class="detail-badge">📅 ${dateStr}</span>
    <div class="detail-stars">${starsHtml(p.stars,'16px')}</div>
  </div>`;
  if(p.with) html+=`<div class="detail-with">👥 <span>Con <strong>${p.with}</strong></span></div>`;
  if(p.notes) html+=`<div class="detail-notes">${p.notes}</div>`;
  if(p.loc) html+=`<div class="detail-loc-full">📍 <div><div>${p.loc.label||'Ubicación'}</div><small style="opacity:.6">${p.loc.lat.toFixed(5)}, ${p.loc.lng.toFixed(5)}</small></div></div>`;
  html+=`<div class="detail-actions">
    <button class="btn-share" onclick="closeDetail();setTimeout(()=>openShare('${p.id}'),250)">📤 Compartir</button>
    <button class="btn-delete" onclick="deletePlan('${p.id}')">🗑 Eliminar</button>
  </div>`;
  html+='</div>';
  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}
function deletePlan(id) {
  if(!confirm('¿Eliminar este plan?')) return;
  plans=plans.filter(p=>p.id!==id); savePlans(); closeDetail();
  renderMapList(); renderList(); renderCal();
}

// ═══════════════════════════════════════════════════════
// SHARE
// ═══════════════════════════════════════════════════════
function openShare(id) {
  const p=plans.find(x=>x.id===id); if(!p) return;
  shareTarget=p;
  const info=planInfo(p);
  const d=new Date(p.date+'T12:00:00');
  const dateStr=d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});

  document.getElementById('share-emoji').textContent=info.emoji;
  document.getElementById('share-stitle').textContent=p.title||info.label;
  document.getElementById('share-stype').textContent=info.label==='Personalizado'?(p.customName||'Plan'):info.label;
  // stars
  let sHtml='';
  for(let i=1;i<=5;i++) sHtml+=`<span class="share-star${i>p.stars?' dim':''}">★</span>`;
  document.getElementById('share-sstars').innerHTML=sHtml;
  let meta=dateStr; if(p.with) meta+=` · Con ${p.with}`; if(p.loc) meta+=` · 📍${p.loc.label||''}`;
  document.getElementById('share-smeta').textContent=meta;

  const bg=document.getElementById('share-bg');
  if(p.photo){ bg.src=p.photo; bg.style.display='block'; document.getElementById('share-emoji').style.display='none'; }
  else { bg.style.display='none'; document.getElementById('share-emoji').style.display='block'; }

  document.getElementById('share-modal').classList.add('open');
}
function closeShare(){document.getElementById('share-modal').classList.remove('open');}

function downloadShare() {
  const inner=document.getElementById('share-inner');
  const W=320,H=568;
  const canvas=document.getElementById('render-canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const p=shareTarget;
  const info=planInfo(p);

  function draw(photoImg) {
    // bg
    if(photoImg){
      ctx.drawImage(photoImg,0,0,W,H);
      // dark overlay
      const grad=ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'rgba(0,0,0,0.1)');
      grad.addColorStop(0.45,'rgba(0,0,0,0.3)');
      grad.addColorStop(1,'rgba(0,0,0,0.85)');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    } else {
      const grad=ctx.createLinearGradient(0,0,W,H);
      grad.addColorStop(0,'#2c6e49'); grad.addColorStop(1,'#1a4a2e');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    }
    // PINNED tag
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.font='bold 13px Syne,sans-serif';
    ctx.textAlign='center'; ctx.letterSpacing='3px';
    ctx.fillText('PINNED',W/2,36);

    const bY=H-140;
    // emoji or type icon (when no photo)
    if(!photoImg){
      ctx.font='56px serif'; ctx.textAlign='left';
      ctx.fillText(info.emoji,32,bY-20);
    }
    // title
    ctx.fillStyle='#ffffff';
    ctx.font='bold 28px Syne,sans-serif'; ctx.textAlign='left';
    const title=p.title||info.label;
    ctx.fillText(title.length>20?title.substring(0,20)+'…':title,32,bY+24);
    // type
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.font='700 13px Lato,sans-serif';
    ctx.fillText(info.label==='Personalizado'?(p.customName||'Plan'):info.label,32,bY+44);
    // stars
    ctx.font='20px serif';
    for(let i=1;i<=5;i++){
      ctx.fillStyle=i<=p.stars?'#f4c430':'rgba(255,255,255,0.2)';
      ctx.fillText('★',32+(i-1)*26,bY+74);
    }
    // meta
    const d=new Date(p.date+'T12:00:00');
    let meta=d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    if(p.with) meta+=` · Con ${p.with}`;
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.font='400 12px Lato,sans-serif'; ctx.textAlign='left';
    ctx.fillText(meta.length>42?meta.substring(0,42)+'…':meta,32,bY+98);

    // download
    const link=document.createElement('a');
    link.download=`pinned-${p.id}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
  }

  if(p.photo){
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>draw(img);
    img.onerror=()=>draw(null);
    img.src=p.photo;
  } else { draw(null); }
}

// ═══════════════════════════════════════════════════════
// BACKDROP CLOSE + SWIPE
// ═══════════════════════════════════════════════════════
['new-modal','detail-modal','share-modal'].forEach(id=>{
  const backdrop=document.getElementById(id);
  backdrop.addEventListener('click',e=>{if(e.target===backdrop){if(id==='new-modal')closeNewPlan();else if(id==='detail-modal')closeDetail();else closeShare();}});
  const modal=backdrop.querySelector('.modal');
  let ty=0;
  modal.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;},{passive:true});
  modal.addEventListener('touchmove',e=>{if(e.touches[0].clientY-ty>90){if(id==='new-modal')closeNewPlan();else if(id==='detail-modal')closeDetail();else closeShare();}},{passive:true});
});

document.addEventListener('DOMContentLoaded',()=>{
  const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth();
  // init first tab dot
  document.querySelector('.tab-btn.active .tab-icon-dot').style.background='var(--accent)';
  initMap(); renderMapList();
});
</script>
