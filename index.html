<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PINNED">
<meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f0f14" media="(prefers-color-scheme: dark)">
<title>PINNED</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#f5f3ef;--bg2:#ffffff;--bg3:#edeae4;--surface:#f0ede8;--surface2:#e4e0d8;--border:rgba(0,0,0,0.09);--accent:#2c6e49;--accent-lt:#e8f5ee;--accent2:#1e5235;--text:#1a1a1a;--text2:#5a5a5a;--text3:#999;--danger:#c0392b;--radius:16px;--radius-sm:10px;--font-display:'Syne',sans-serif;--font-body:'Lato',sans-serif;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);--shadow:0 1px 4px rgba(0,0,0,0.07),0 4px 16px rgba(0,0,0,0.05);}
@media(prefers-color-scheme:dark){:root{--bg:#0f0f14;--bg2:#16161e;--bg3:#1e1e2a;--surface:#22222f;--surface2:#2a2a3a;--border:rgba(255,255,255,0.07);--accent:#e8c97a;--accent-lt:rgba(232,201,122,0.12);--accent2:#c4a55a;--text:#f0ede8;--text2:#a09b92;--text3:#5a5660;--danger:#e07070;--shadow:0 2px 12px rgba(0,0,0,0.4);}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:15px;overscroll-behavior:none;-webkit-overflow-scrolling:touch;}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;overflow:hidden;}
header{z-index:50;padding:calc(var(--safe-top) + 16px) 18px 12px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-display);font-size:20px;font-weight:800;letter-spacing:3px;color:var(--text);}
.logo .pin{color:var(--accent);margin-right:2px;}
.btn-new{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:50px;padding:9px 16px;font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;}
.btn-new:active{opacity:.8;}
.btn-new svg{width:14px;height:14px;}
.tabs{display:flex;padding:8px 12px 10px;gap:4px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:7px 4px;border:none;background:transparent;color:var(--text3);border-radius:8px;font-family:var(--font-body);font-weight:700;font-size:11px;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.tab-btn .tab-icon{font-size:18px;}
.tab-btn.active{color:var(--accent);}
.tab-dot{width:4px;height:4px;border-radius:50%;margin:0 auto;}
.view{display:none;flex:1;overflow:hidden;flex-direction:column;}
.view.active{display:flex;}
#map-view{position:relative;}
#map{flex:0 0 50%;width:100%;z-index:1;background:var(--bg3);}
.map-tag{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.92);border:1px solid var(--border);backdrop-filter:blur(10px);color:var(--text2);font-size:11px;font-weight:700;padding:5px 14px;border-radius:50px;z-index:10;white-space:nowrap;box-shadow:var(--shadow);}
@media(prefers-color-scheme:dark){.map-tag{background:rgba(15,15,20,.88);}}
.list-panel{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(var(--safe-bottom) + 20px);display:flex;flex-direction:column;gap:8px;background:var(--bg);}
.sec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:0 4px 6px;}
#cal-view{background:var(--bg);}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px;flex-shrink:0;}
.cal-month-lbl{font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:-.3px;text-transform:capitalize;}
.cal-nav{display:flex;gap:8px;}
.cal-nb{width:32px;height:32px;border:1px solid var(--border);background:var(--bg2);border-radius:50%;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
.cal-nb:active{background:var(--surface2);}
.cal-gh{display:grid;grid-template-columns:repeat(7,1fr);padding:0 10px;flex-shrink:0;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text3);padding-bottom:6px;text-transform:uppercase;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 10px;flex-shrink:0;}
.cal-day{min-height:44px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:5px;border-radius:8px;cursor:default;gap:2px;padding-bottom:3px;}
.cal-day.has-plans{cursor:pointer;}
.cal-day.has-plans:active{background:var(--surface);}
.cal-dn{font-size:12px;font-weight:400;color:var(--text3);line-height:1;}
.cal-day.today .cal-dn{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;}
.cal-day.has-plans .cal-dn{color:var(--text);font-weight:700;}
.cal-day.other-m .cal-dn{opacity:.3;}
.cal-pills{display:flex;flex-direction:column;gap:2px;width:100%;padding:0 2px;}
.cal-pill{height:5px;border-radius:3px;width:100%;background:var(--accent);opacity:.75;}
.cal-pill.more{opacity:.3;}
.cal-scroll{flex:1;overflow-y:auto;padding:12px 14px;padding-bottom:calc(var(--safe-bottom) + 20px);display:flex;flex-direction:column;gap:8px;}
.sort-bar{display:flex;gap:6px;padding:10px 14px 8px;flex-shrink:0;background:var(--bg);}
.sort-btn{padding:6px 12px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:50px;font-size:12px;font-family:var(--font-body);font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.sort-btn.active{background:var(--accent-lt);color:var(--accent);border-color:var(--accent);}
#list-scroll{flex:1;overflow-y:auto;padding:4px 14px;padding-bottom:calc(var(--safe-bottom) + 20px);display:flex;flex-direction:column;gap:8px;}
.plan-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;align-items:stretch;cursor:pointer;box-shadow:var(--shadow);}
.plan-card:active{opacity:.85;}
.pc-photo{width:72px;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;overflow:hidden;}
.pc-photo img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.pc-body{flex:1;padding:10px 12px 9px;min-width:0;}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:1px;}
.pc-title{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-stars{display:flex;gap:1px;flex-shrink:0;}
.star{color:var(--surface2);font-size:11px;}
.star.lit{color:#f4c430;}
.pc-sub{font-size:11px;color:var(--text2);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pc-date{font-size:11px;color:var(--text3);}
.pc-loc{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:50px 20px;color:var(--text3);text-align:center;}
.empty-state .big{font-size:44px;}
.empty-state p{font-size:13px;line-height:1.6;}
.custom-marker{width:38px;height:38px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.6);box-shadow:0 4px 14px rgba(0,0,0,.25);}
.custom-marker-inner{transform:rotate(45deg);font-size:15px;}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:94dvh;overflow-y:auto;padding:0 0 calc(var(--safe-bottom) + 24px);transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);border-top:1px solid var(--border);}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--surface2);border-radius:2px;margin:12px auto 0;}
.modal-header{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.3px;}
.modal-close{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:50%;color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:16px;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:block;}
.field-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:15px;padding:11px 13px;outline:none;transition:border-color .2s;-webkit-appearance:none;}
.field-input::placeholder{color:var(--text3);}
.field-input:focus{border-color:var(--accent);background:var(--bg2);}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.type-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 6px 9px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
.type-btn:active{opacity:.8;}
.type-btn.selected{border-color:var(--accent);background:var(--accent-lt);}
.type-btn-emoji{font-size:22px;}
.type-btn-label{font-size:10px;font-weight:700;color:var(--text2);text-align:center;font-family:var(--font-body);}
.type-btn.selected .type-btn-label{color:var(--accent);}
.stars-input{display:flex;gap:6px;padding:2px 0;}
.star-input{font-size:32px;cursor:pointer;color:var(--surface2);-webkit-user-select:none;user-select:none;}
.star-input.lit{color:#f4c430;}
.star-input:active{transform:scale(1.3);}
.photo-area{border:1.5px dashed var(--border);border-radius:var(--radius-sm);min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;overflow:hidden;position:relative;background:var(--surface);}
.photo-area img{width:100%;height:150px;object-fit:cover;}
.photo-area-lbl{font-size:12px;color:var(--text3);display:flex;flex-direction:column;align-items:center;gap:4px;font-weight:700;}
.photo-area-lbl .icon{font-size:22px;}
.photo-btns{display:flex;gap:8px;margin-top:8px;}
.photo-btn{flex:1;text-align:center;padding:8px 6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);border-radius:50px;font-size:12px;font-family:var(--font-body);font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.photo-btn:active{background:var(--accent-lt);color:var(--accent);border-color:var(--accent);}
.loc-row{display:flex;gap:8px;align-items:center;}
.loc-display{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:var(--text2);min-height:38px;display:flex;align-items:center;}
.btn-loc{padding:10px 13px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--accent);font-size:17px;cursor:pointer;flex-shrink:0;}
.btn-loc:active{background:var(--surface2);}
.loc-sugg{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:4px;max-height:180px;overflow-y:auto;}
.loc-sugg-item{padding:10px 13px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);color:var(--text);}
.loc-sugg-item:last-child{border-bottom:none;}
.loc-sugg-item:active{background:var(--surface);}
.no-loc{color:var(--text3);font-size:13px;}
.btn-save{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:700;font-size:15px;cursor:pointer;}
.btn-save:active{opacity:.85;}
.custom-plan-fields{display:flex;flex-direction:column;gap:10px;}
.ep-row{display:flex;flex-wrap:wrap;gap:6px;padding:8px;background:var(--surface);border-radius:var(--radius-sm);}
.ep-emoji{font-size:22px;cursor:pointer;padding:3px;border-radius:6px;}
.ep-emoji.selected{background:var(--surface2);}
.detail-photo{width:100%;height:200px;object-fit:cover;}
.detail-no-photo{width:100%;height:110px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:50px;}
.detail-body{padding:16px 18px;}
.detail-plan-title{font-family:var(--font-display);font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px;}
.detail-type-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.detail-badge{background:var(--surface);border-radius:50px;padding:4px 11px;font-size:12px;color:var(--text2);font-weight:700;border:1px solid var(--border);}
.detail-stars{display:flex;gap:2px;}
.detail-stars .star{font-size:16px;}
.d-row{display:flex;gap:6px;align-items:center;background:var(--surface);border-radius:var(--radius-sm);padding:10px 13px;font-size:13px;color:var(--text2);margin-bottom:8px;border:1px solid var(--border);}
.detail-notes{font-size:14px;color:var(--text2);line-height:1.6;background:var(--surface);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:8px;border:1px solid var(--border);}
.detail-actions{display:flex;gap:8px;margin-top:8px;}
.btn-share{flex:1;padding:12px;background:var(--accent-lt);border:1.5px solid var(--accent);border-radius:var(--radius-sm);color:var(--accent);font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;}
.btn-share:active{background:var(--accent);color:#fff;}
.btn-delete{flex:1;padding:12px;background:transparent;border:1px solid rgba(192,57,43,.3);border-radius:var(--radius-sm);color:var(--danger);font-family:var(--font-body);font-size:14px;font-weight:700;cursor:pointer;}
.btn-delete:active{background:rgba(192,57,43,.08);}
.share-wrap{padding:0 18px;display:flex;flex-direction:column;gap:12px;align-items:center;}
#share-canvas{width:100%;max-width:320px;aspect-ratio:9/16;border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.share-inner{width:320px;height:568px;position:relative;background:linear-gradient(135deg,#2c6e49,#1a4a2e);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:32px;}
.share-bg{position:absolute;inset:0;object-fit:cover;width:100%;height:100%;opacity:.55;}
.share-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 40%,transparent);}
.share-content{position:relative;z-index:2;width:100%;}
.share-emoji{font-size:52px;display:block;margin-bottom:8px;}
.share-title-el{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;color:#fff;line-height:1.1;margin-bottom:4px;}
.share-type-el{font-size:14px;color:rgba(255,255,255,.7);font-weight:700;margin-bottom:12px;}
.share-stars-row{display:flex;gap:4px;margin-bottom:10px;}
.s-star{font-size:20px;color:#f4c430;}
.s-star.dim{opacity:.25;}
.share-meta-el{font-size:12px;color:rgba(255,255,255,.6);}
.share-app-tag{position:absolute;top:20px;left:0;right:0;text-align:center;z-index:2;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,.6);}
.btn-dl{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font-body);font-weight:700;font-size:15px;cursor:pointer;}
.share-hint{font-size:12px;color:var(--text3);text-align:center;line-height:1.5;padding:0 10px 4px;}
.leaflet-container{background:#e8e4da;}
@media(prefers-color-scheme:dark){.leaflet-container{background:#1a1a24;}.leaflet-tile{filter:brightness(.75) saturate(.6) hue-rotate(200deg);}}
.leaflet-control-zoom a{background:var(--bg2)!important;color:var(--text)!important;border-color:var(--border)!important;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo"><span class="pin">&#128205;</span>PINNED</div>
    <button class="btn-new" onclick="openNewPlan()">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      Nuevo
    </button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('map',this)"><span class="tab-icon">&#128506;&#65039;</span><span>Mapa</span><div class="tab-dot" id="dot-map"></div></button>
    <button class="tab-btn" onclick="switchTab('cal',this)"><span class="tab-icon">&#128197;</span><span>Calendario</span><div class="tab-dot" id="dot-cal"></div></button>
    <button class="tab-btn" onclick="switchTab('list',this)"><span class="tab-icon">&#128203;</span><span>Lista</span><div class="tab-dot" id="dot-list"></div></button>
  </div>

  <div id="map-view" class="view active">
    <div id="map"></div>
    <div class="map-tag" id="map-tag">Cargando...</div>
    <div class="list-panel" id="map-list"><div class="sec-title">Planes cercanos &amp; recientes</div></div>
  </div>

  <div id="cal-view" class="view">
    <div class="cal-header">
      <div class="cal-month-lbl" id="cal-month-label"></div>
      <div class="cal-nav">
        <button class="cal-nb" onclick="calNav(-1)">&#8249;</button>
        <button class="cal-nb" onclick="calNav(1)">&#8250;</button>
      </div>
    </div>
    <div class="cal-gh"><div class="cal-dow">L</div><div class="cal-dow">M</div><div class="cal-dow">X</div><div class="cal-dow">J</div><div class="cal-dow">V</div><div class="cal-dow">S</div><div class="cal-dow">D</div></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-scroll" id="cal-scroll"><div class="sec-title" id="cal-list-label">Todos los planes del mes</div></div>
  </div>

  <div id="list-view" class="view">
    <div class="sort-bar">
      <button class="sort-btn active" onclick="setSort('fecha',this)">&#128197; Fecha</button>
      <button class="sort-btn" onclick="setSort('stars',this)">&#11088; Nota</button>
      <button class="sort-btn" onclick="setSort('cerca',this)">&#128205; Cercan&#237;a</button>
    </div>
    <div id="list-scroll"></div>
  </div>
</div>

<!-- NEW PLAN -->
<div class="modal-backdrop" id="new-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header"><div class="modal-title">Nuevo plan</div><button class="modal-close" onclick="closeNewPlan()">&#10005;</button></div>
    <div class="modal-body">
      <div>
        <label class="field-label">Tipo de plan</label>
        <div class="type-grid">
          <div class="type-btn selected" data-type="gym" onclick="selectType(this)"><span class="type-btn-emoji">&#127947;&#65039;</span><span class="type-btn-label">Gimnasio</span></div>
          <div class="type-btn" data-type="dinner" onclick="selectType(this)"><span class="type-btn-emoji">🍽️</span><span class="type-btn-label">Cena</span></div>
          <div class="type-btn" data-type="cinema" onclick="selectType(this)"><span class="type-btn-emoji">&#127916;</span><span class="type-btn-label">Cine</span></div>
          <div class="type-btn" data-type="hike" onclick="selectType(this)"><span class="type-btn-emoji">⛰️</span><span class="type-btn-label">Ruta</span></div>
          <div class="type-btn" data-type="offroad" onclick="selectType(this)"><span class="type-btn-emoji">&#128665;</span><span class="type-btn-label">4&#215;4</span></div>
          <div class="type-btn" data-type="custom" onclick="selectType(this)"><span class="type-btn-emoji">&#10024;</span><span class="type-btn-label">Personalizado</span></div>
        </div>
      </div>
      <div id="custom-fields" style="display:none">
        <label class="field-label">Plan personalizado</label>
        <div class="custom-plan-fields">
          <input class="field-input" id="custom-name" placeholder="Nombre del plan..." type="text">
          <div>

<canvas id="render-canvas" style="display:none"></canvas>

<script>
var PLAN_TYPES={gym:{emoji:'🏋️',label:'Gimnasio'},dinner:{emoji:'🍽️',label:'Cena'},cinema:{emoji:'🎬',label:'Cine'},hike:{emoji:'⛰️',label:'Ruta'},offroad:{emoji:'🚙',label:'4x4'},custom:{emoji:'✨',label:'Personalizado'}};
var plans=JSON.parse(localStorage.getItem('pinned_v2')||'[]');
var currentStar=0,currentType='gym',currentPhoto=null,currentLoc=null;
var currentCustomEmoji='✨',selectedEmojiEl=null;
var userLoc=null,map=null,currentSort='fecha';
var calYear,calMonth,calFilterDate=null,shareTarget=null;
var locTimer=null;

function savePlans(){localStorage.setItem('pinned_v2',JSON.stringify(plans));}
function planInfo(p){return p.type==='custom'?{emoji:p.customEmoji||'✨',label:p.customName||'Plan'}:PLAN_TYPES[p.type]||PLAN_TYPES.custom;}

function switchTab(tab,btn){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  ['map','cal','list'].forEach(function(t){var d=document.getElementById('dot-'+t);if(d)d.style.background='';});
  btn.classList.add('active');
  var dot=document.getElementById('dot-'+tab);if(dot)dot.style.background='var(--accent)';
  document.getElementById(tab+'-view').classList.add('active');
  if(tab==='map'){setTimeout(function(){if(map)map.invalidateSize();},100);renderMapList();}
  if(tab==='cal')renderCal();
  if(tab==='list')renderList();
}

function initMap(){
  map=L.map('map',{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  map.setView([40.416,-3.703],12);
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(function(pos){
      userLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setView([userLoc.lat,userLoc.lng],13);
      document.getElementById('map-tag').textContent='Cerca de ti';
      var icon=L.divIcon({className:'',html:'<div style="width:13px;height:13px;background:var(--accent);border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(44,110,73,0.2);"></div>',iconSize:[13,13],iconAnchor:[6,6]});
      L.marker([userLoc.lat,userLoc.lng],{icon:icon}).addTo(map);
      addPlanMarkers();renderMapList();
    },function(){document.getElementById('map-tag').textContent='Activa ubicación para ver cerca';addPlanMarkers();});
  }
}
function addPlanMarkers(){
  plans.forEach(function(p){
    if(!p.loc)return;
    var info=planInfo(p);
    var icon=L.divIcon({className:'',html:'<div class="custom-marker" style="background:var(--accent)"><div class="custom-marker-inner">'+info.emoji+'</div></div>',iconSize:[38,38],iconAnchor:[19,38],popupAnchor:[0,-38]});
    L.marker([p.loc.lat,p.loc.lng],{icon:icon}).addTo(map).on('click',function(){openDetail(p.id);});
  });
}

function starsHtml(n,size){var h='';for(var i=1;i<=5;i++)h+='<span class="star '+(i<=n?'lit':'')+'"'+(size?' style="font-size:'+size+'"':'')+'>&#9733;</span>';return h;}
function distKm(a,b){if(!a||!b)return Infinity;var R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180,x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function distLabel(km){if(km===Infinity)return '';return km<1?Math.round(km*1000)+' m':km.toFixed(1)+' km';}

function planCard(p){
  var info=planInfo(p);
  var d=new Date(p.date+'T12:00:00');
  var ds=d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
  var km=distKm(userLoc,p.loc);
  var locTxt=p.loc?(distLabel(km)?distLabel(km)+' · '+(p.loc.label||''):(p.loc.label||'')):'';
  var dn=p.title||(p.type==='custom'?p.customName:info.label)||info.label;
  var sub=p.title?(info.emoji+' '+(info.label==='Personalizado'?(p.customName||'Plan'):info.label)):'';
  return '<div class="plan-card" onclick="openDetail(\''+p.id+'\')">'+
    '<div class="pc-photo">'+(p.photo?'<img src="'+p.photo+'" alt="">':info.emoji)+'</div>'+
    '<div class="pc-body">'+
    '<div class="pc-top"><div class="pc-title">'+dn+'</div><div class="pc-stars">'+starsHtml(p.stars)+'</div></div>'+
    (sub?'<div class="pc-sub">'+sub+'</div>':'')+
    '<div class="pc-date">'+ds+(p.with?' · 👥 '+p.with:'')+'</div>'+
    (locTxt?'<div class="pc-loc">📍 '+locTxt+'</div>':'')+
    '</div></div>';
}

function renderMapList(){
  var el=document.getElementById('map-list');
  var sorted=plans.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(userLoc)sorted.sort(function(a,b){return distKm(userLoc,a.loc)-distKm(userLoc,b.loc);});
  el.innerHTML='<div class="sec-title">Planes cercanos &amp; recientes</div>';
  if(!sorted.length){el.innerHTML+='<div class="empty-state"><div class="big">🗺️</div><p>Aún no hay planes.<br>Pulsa + Nuevo para empezar.</p></div>';return;}
  sorted.forEach(function(p){el.innerHTML+=planCard(p);});
}
function renderList(){
  var el=document.getElementById('list-scroll');
  var sorted=plans.slice();
  if(currentSort==='fecha')sorted.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  else if(currentSort==='stars')sorted.sort(function(a,b){return b.stars-a.stars;});
  else sorted.sort(function(a,b){return distKm(userLoc,a.loc)-distKm(userLoc,b.loc);});
  el.innerHTML='';
  if(!sorted.length){el.innerHTML='<div class="empty-state"><div class="big">📋</div><p>Aún no hay planes registrados.</p></div>';return;}
  sorted.forEach(function(p){el.innerHTML+=planCard(p);});
}
function setSort(s,btn){currentSort=s;document.querySelectorAll('.sort-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderList();}

var MONTHS_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function calNav(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}else if(calMonth<0){calMonth=11;calYear--;}calFilterDate=null;renderCal();}
function renderCal(){
  var now=new Date();
  var todayStr=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0');
  document.getElementById('cal-month-label').textContent=MONTHS_ES[calMonth]+' '+calYear;
  var plansByDay={};
  plans.forEach(function(p){var parts=p.date.split('-');var y=parseInt(parts[0]),m=parseInt(parts[1]);if(y===calYear&&m-1===calMonth){if(!plansByDay[p.date])plansByDay[p.date]=[];plansByDay[p.date].push(p);}});
  var firstDay=new Date(calYear,calMonth,1);
  var startDow=(firstDay.getDay()+6)%7;
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var daysInPrev=new Date(calYear,calMonth,0).getDate();
  var cells=Math.ceil((startDow+daysInMonth)/7)*7;
  var grid='';
  for(var i=0;i<cells;i++){
    var day,mo=calMonth,yr=calYear,other=false;
    if(i<startDow){day=daysInPrev-(startDow-1-i);mo=calMonth-1;if(mo<0){mo=11;yr--;}other=true;}
    else if(i-startDow>=daysInMonth){day=i-startDow-daysInMonth+1;mo=calMonth+1;if(mo>11){mo=0;yr++;}other=true;}
    else{day=i-startDow+1;}
    var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var dp=plansByDay[ds]||[];
    var isSel=ds===calFilterDate;
    var pills=dp.slice(0,3).map(function(x,idx){return '<div class="cal-pill'+(idx===2&&dp.length>2?' more':'')+'"></div>';}).join('');
    grid+='<div class="cal-day'+(dp.length?' has-plans':'')+(other?' other-m':'')+(ds===todayStr?' today':'')+(isSel?' selected':'')+'"'+
      (dp.length?' onclick="calSelectDay(\''+ds+'\')"':'')+
      (isSel?' style="background:var(--accent-lt)"':'')+'>'+
      '<div class="cal-dn">'+day+'</div>'+
      (dp.length?'<div class="cal-pills">'+pills+'</div>':'')+
      '</div>';
  }
  document.getElementById('cal-grid').innerHTML=grid;
  renderCalList();
}
function calSelectDay(ds){calFilterDate=calFilterDate===ds?null:ds;renderCal();}
function renderCalList(){
  var el=document.getElementById('cal-scroll');
  var label=document.getElementById('cal-list-label');
  var filtered;
  if(calFilterDate){
    filtered=plans.filter(function(p){return p.date===calFilterDate;});
    var d=new Date(calFilterDate+'T12:00:00');
    label.textContent=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  }else{
    filtered=plans.filter(function(p){var parts=p.date.split('-');return parseInt(parts[0])===calYear&&parseInt(parts[1])-1===calMonth;});
    filtered.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    label.textContent=MONTHS_ES[calMonth]+' '+calYear;
  }
  el.innerHTML='';
  el.appendChild(label);
  if(!filtered.length){el.innerHTML+='<div class="empty-state" style="padding:30px 0"><div class="big">📅</div><p>Sin planes este día</p></div>';return;}
  filtered.forEach(function(p){el.innerHTML+=planCard(p);});
}

function openNewPlan(){
  currentStar=0;currentType='gym';currentPhoto=null;currentLoc=null;currentCustomEmoji='✨';
  document.getElementById('plan-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('plan-notes').value='';
  document.getElementById('plan-title').value='';
  document.getElementById('plan-with').value='';
  document.getElementById('custom-name').value='';
  document.getElementById('custom-emoji').value='';
  document.getElementById('loc-search').value='';
  document.getElementById('loc-sugg').style.display='none';
  document.getElementById('loc-display').innerHTML='<span class="no-loc">Sin ubicación seleccionada</span>';
  document.getElementById('photo-area').innerHTML='<div class="photo-area-lbl"><span class="icon">📷</span><span>Elige foto abajo</span></div>';
  document.querySelectorAll('.star-input').forEach(function(s){s.classList.remove('lit');});
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('selected');});
  document.querySelector('[data-type="gym"]').classList.add('selected');
  document.getElementById('custom-fields').style.display='none';
  buildEmojiPicker();
  document.getElementById('new-modal').classList.add('open');
}
function closeNewPlan(){document.getElementById('new-modal').classList.remove('open');}
function selectType(el){
  document.querySelectorAll('.type-btn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected');currentType=el.dataset.type;
  document.getElementById('custom-fields').style.display=currentType==='custom'?'flex':'none';
  if(currentType==='custom')document.getElementById('custom-fields').style.flexDirection='column';
}
function setStar(n){currentStar=n;document.querySelectorAll('.star-input').forEach(function(s){s.classList.toggle('lit',parseInt(s.dataset.v)<=n);});}

function handlePhoto(e){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){currentPhoto=ev.target.result;document.getElementById('photo-area').innerHTML='<img src="'+ev.target.result+'" alt="" style="width:100%;height:150px;object-fit:cover">';};
  r.readAsDataURL(file);
}

function onLocSearch(){
  var q=document.getElementById('loc-search').value.trim();
  clearTimeout(locTimer);
  var sug=document.getElementById('loc-sugg');
  if(q.length<3){sug.style.display='none';return;}
  locTimer=setTimeout(function(){doLocSearch(q);},450);
}
function doLocSearch(q){
  var sug=document.getElementById('loc-sugg');
  sug.style.display='block';
  sug.innerHTML='<div style="padding:10px 13px;font-size:12px;color:var(--text3)">Buscando...</div>';
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=5&accept-language=es')
    .then(function(r){return r.json();})
    .then(function(results){
      if(!results.length){sug.innerHTML='<div style="padding:10px 13px;font-size:12px;color:var(--text3)">Sin resultados</div>';return;}
      sug.innerHTML='';
      results.forEach(function(r){
        var label=(r.display_name||'').substring(0,65);
        var div=document.createElement('div');
        div.className='loc-sugg-item';
        div.textContent='📍 '+label;
        var lat=parseFloat(r.lat),lng=parseFloat(r.lon);
        div.addEventListener('mousedown',function(e){e.preventDefault();});
        div.addEventListener('click',function(){selectLocResult(lat,lng,label);});
        sug.appendChild(div);
      });
    })
    .catch(function(){sug.innerHTML='<div style="padding:10px 13px;font-size:12px;color:var(--text3)">Error al buscar</div>';});
}
function selectLocResult(lat,lng,label){
  currentLoc={lat:lat,lng:lng,label:label};
  document.getElementById('loc-sugg').style.display='none';
  document.getElementById('loc-search').value=label;
  document.getElementById('loc-display').textContent=label;
}
function getLocation(){
  if(!navigator.geolocation)return;
  document.getElementById('loc-display').innerHTML='<span class="no-loc">Obteniendo...</span>';
  navigator.geolocation.getCurrentPosition(function(pos){
    currentLoc={lat:pos.coords.latitude,lng:pos.coords.longitude,label:''};
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+pos.coords.latitude+'&lon='+pos.coords.longitude+'&format=json')
      .then(function(r){return r.json();})
      .then(function(d){
        var parts=[];
        if(d.address.road)parts.push(d.address.road);
        if(d.address.city||d.address.town||d.address.village)parts.push(d.address.city||d.address.town||d.address.village);
        currentLoc.label=parts.join(', ')||pos.coords.latitude.toFixed(4)+', '+pos.coords.longitude.toFixed(4);
        document.getElementById('loc-search').value=currentLoc.label;
        document.getElementById('loc-display').textContent=currentLoc.label;
        document.getElementById('loc-sugg').style.display='none';
      })
      .catch(function(){currentLoc.label=pos.coords.latitude.toFixed(4)+', '+pos.coords.longitude.toFixed(4);document.getElementById('loc-display').textContent=currentLoc.label;});
  },function(){document.getElementById('loc-display').innerHTML='<span class="no-loc">No se pudo obtener</span>';});
}

function buildEmojiPicker(){
  var emojis=['🎯','🎮','🎸','🎉','🏖️','🧗','🪂','🏄','🎾','⛷️','🤿','🚴','🏕️','🧘','🎲','🍕','🍺','🎭','🌄','🌊','🎪','🥊','🛹','🛶','🏹','🦅','🌺','🍣','🎵','🤸'];
  document.getElementById('emoji-picker').innerHTML=emojis.map(function(e){return '<span class="ep-emoji" onclick="pickEmoji(this,\''+e+'\')">'+e+'</span>';}).join('');
}
function pickEmoji(el,emoji){if(selectedEmojiEl)selectedEmojiEl.classList.remove('selected');el.classList.add('selected');selectedEmojiEl=el;currentCustomEmoji=emoji;document.getElementById('custom-emoji').value=emoji;}

function savePlan(){
  var date=document.getElementById('plan-date').value;
  if(!date){alert('Por favor, elige una fecha.');return;}
  if(!currentStar){alert('Por favor, puntua el plan (1-5 estrellas)');return;}
  if(currentType==='custom'){
    if(!document.getElementById('custom-name').value.trim()){alert('Por favor, pon un nombre al plan.');return;}
    var ef=document.getElementById('custom-emoji').value.trim();
    if(ef)currentCustomEmoji=ef;
  }
  var plan={
    id:Date.now().toString(),type:currentType,
    customName:currentType==='custom'?document.getElementById('custom-name').value.trim():'',
    customEmoji:currentType==='custom'?currentCustomEmoji:'',
    title:document.getElementById('plan-title').value.trim(),
    with:document.getElementById('plan-with').value.trim(),
    date:date,stars:currentStar,
    notes:document.getElementById('plan-notes').value.trim(),
    photo:currentPhoto,loc:currentLoc,createdAt:Date.now()
  };
  plans.unshift(plan);savePlans();closeNewPlan();
  if(plan.loc&&map){
    var info=planInfo(plan);
    var icon=L.divIcon({className:'',html:'<div class="custom-marker" style="background:var(--accent)"><div class="custom-marker-inner">'+info.emoji+'</div></div>',iconSize:[38,38],iconAnchor:[19,38]});
    L.marker([plan.loc.lat,plan.loc.lng],{icon:icon}).addTo(map).on('click',function(){openDetail(plan.id);});
  }
  renderMapList();renderList();
  setTimeout(function(){openShare(plan.id);},300);
}

function openDetail(id){
  var p=null;for(var i=0;i<plans.length;i++){if(plans[i].id===id){p=plans[i];break;}}
  if(!p)return;
  var info=planInfo(p);
  var d=new Date(p.date+'T12:00:00');
  var ds=d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var dn=p.title||info.label;
  document.getElementById('detail-title').textContent=info.emoji+' '+dn;
  var html='';
  if(p.photo)html+='<img class="detail-photo" src="'+p.photo+'" alt="">';
  else html+='<div class="detail-no-photo">'+info.emoji+'</div>';
  html+='<div class="detail-body">';
  if(p.title)html+='<div class="detail-plan-title">'+p.title+'</div>';
  html+='<div class="detail-type-row"><span class="detail-badge">'+info.emoji+' '+(info.label==='Personalizado'?(p.customName||'Plan'):info.label)+'</span><span class="detail-badge">📅 '+ds+'</span><div class="detail-stars">'+starsHtml(p.stars,'16px')+'</div></div>';
  if(p.with)html+='<div class="d-row">👥 <span>Con <strong>'+p.with+'</strong></span></div>';
  if(p.notes)html+='<div class="detail-notes">'+p.notes+'</div>';
  if(p.loc)html+='<div class="d-row">📍 <div><div>'+(p.loc.label||'Ubicación')+'</div><small style="opacity:.6">'+p.loc.lat.toFixed(5)+', '+p.loc.lng.toFixed(5)+'</small></div></div>';
  html+='<div class="detail-actions"><button class="btn-share" onclick="closeDetail();setTimeout(function(){openShare(\''+p.id+'\')},250)">📤 Compartir</button><button class="btn-delete" onclick="deletePlan(\''+p.id+'\')">🗑 Eliminar</button></div></div>';
  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('detail-modal').classList.add('open');
}
function closeDetail(){document.getElementById('detail-modal').classList.remove('open');}
function deletePlan(id){
  if(!confirm('Eliminar este plan?'))return;
  plans=plans.filter(function(p){return p.id!==id;});savePlans();closeDetail();
  renderMapList();renderList();renderCal();
}

function openShare(id){
  var p=null;for(var i=0;i<plans.length;i++){if(plans[i].id===id){p=plans[i];break;}}
  if(!p)return;shareTarget=p;
  var info=planInfo(p);
  var d=new Date(p.date+'T12:00:00');
  var ds=d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
  document.getElementById('share-emoji-el').textContent=info.emoji;
  document.getElementById('share-title-el').textContent=p.title||info.label;
  document.getElementById('share-type-el').textContent=info.label==='Personalizado'?(p.customName||'Plan'):info.label;
  var sH='';for(var i=1;i<=5;i++)sH+='<span class="s-star'+(i>p.stars?' dim':'')+'">★</span>';
  document.getElementById('share-stars-el').innerHTML=sH;
  var meta=ds;if(p.with)meta+=' · Con '+p.with;if(p.loc)meta+=' · 📍'+(p.loc.label||'');
  document.getElementById('share-meta-el').textContent=meta;
  var bg=document.getElementById('share-bg-img');
  if(p.photo){bg.src=p.photo;bg.style.display='block';document.getElementById('share-emoji-el').style.display='none';}
  else{bg.style.display='none';document.getElementById('share-emoji-el').style.display='block';}
  document.getElementById('share-modal').classList.add('open');
}
function closeShare(){document.getElementById('share-modal').classList.remove('open');}
function downloadShare(){
  var p=shareTarget;var info=planInfo(p);
  var W=320,H=568;
  var canvas=document.getElementById('render-canvas');canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');
  function draw(photoImg){
    if(photoImg){
      ctx.drawImage(photoImg,0,0,W,H);
      var grad=ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'rgba(0,0,0,0.1)');grad.addColorStop(0.45,'rgba(0,0,0,0.3)');grad.addColorStop(1,'rgba(0,0,0,0.85)');
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    }else{
      var grad=ctx.createLinearGradient(0,0,W,H);grad.addColorStop(0,'#2c6e49');grad.addColorStop(1,'#1a4a2e');
      ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    }
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('PINNED',W/2,36);
    var bY=H-140;
    if(!photoImg){ctx.font='52px serif';ctx.textAlign='left';ctx.fillText(info.emoji,32,bY-20);}
    ctx.fillStyle='#fff';ctx.font='bold 26px sans-serif';ctx.textAlign='left';
    ctx.fillText((p.title||info.label).substring(0,22),32,bY+24);
    ctx.fillStyle='rgba(255,255,255,0.65)';ctx.font='13px sans-serif';
    ctx.fillText(info.label==='Personalizado'?(p.customName||'Plan'):info.label,32,bY+44);
    for(var i=1;i<=5;i++){ctx.fillStyle=i<=p.stars?'#f4c430':'rgba(255,255,255,0.2)';ctx.font='18px serif';ctx.fillText('★',32+(i-1)*24,bY+72);}
    var d=new Date(p.date+'T12:00:00');var meta=d.toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
    if(p.with)meta+=' · Con '+p.with;
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font='12px sans-serif';ctx.fillText(meta.substring(0,44),32,bY+96);
    var link=document.createElement('a');link.download='pinned-'+p.id+'.png';link.href=canvas.toDataURL('image/png');link.click();
  }
  if(p.photo){var img=new Image();img.crossOrigin='anonymous';img.onload=function(){draw(img);};img.onerror=function(){draw(null);};img.src=p.photo;}
  else{draw(null);}
}

['new-modal','detail-modal','share-modal'].forEach(function(id){
  var backdrop=document.getElementById(id);
  backdrop.addEventListener('click',function(e){if(e.target===backdrop){if(id==='new-modal')closeNewPlan();else if(id==='detail-modal')closeDetail();else closeShare();}});
  var modal=backdrop.querySelector('.modal');
  var ty=0;
  modal.addEventListener('touchstart',function(e){ty=e.touches[0].clientY;},{passive:true});
  modal.addEventListener('touchmove',function(e){if(e.touches[0].clientY-ty>90){if(id==='new-modal')closeNewPlan();else if(id==='detail-modal')closeDetail();else closeShare();}},{passive:true});
});

document.addEventListener('DOMContentLoaded',function(){
  var now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  document.getElementById('dot-map').style.background='var(--accent)';
  initMap();renderMapList();
});
</script>
</body>
